<!DOCTYPE html>
<html>
<head>
    <title>Eco Essentials – Redeem Rewards</title>
    <style>
        body { margin:0; font-family:Arial; background:#d9e3d7; text-align: center; }
        #headerRow { display:flex; align-items:center; background:#fdf8f0; padding:15px; border-bottom: 2px solid #356647;}
        #webname { padding-left: 20px; font-size: 32px; color: #356647; font-weight:bold; }
        #tokenTracker { background: #4c8c5a; color: white; padding: 10px 18px; margin-left: auto; margin-right:20px; font-weight: bold; border-radius: 6px; display: flex; align-items: center; }
        
        #redeemBox {
            background: #fdf8f0;
            max-width: 600px;
            margin: 40px auto;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: left; /* Align form text to left */
        }
        
        .success-header { text-align: center; margin-bottom: 30px; }
        .success-icon { font-size: 60px; color: #2a8c68; }
        h1 { color: #356647; margin: 10px 0; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; color: #356647; margin-bottom: 5px; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Ensures padding doesn't break width */
            font-size: 15px;
        }

        .confirm-btn {
            display: block;
            width: 100%;
            background: #2a8c68;
            color: white;
            padding: 15px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .confirm-btn:hover { background: #1c6e4e; }
        
        #footer { background: #4c8c5a; color: white; padding: 40px 20px; margin-top: 60px; text-align: center; }
    </style>
</head>
<body>

<div id="headerRow">
    <div id="webname">Eco Essentials</div>
    <div id="tokenTracker">🍃 EcoTokens: <b id="balance">0</b></div>
</div>

<div id="redeemBox">
    <div class="success-header">
        <div class="success-icon">🍃</div>
        <h1>Redeem Your Reward</h1>
        <p>You are redeeming <b>50 tokens</b> for your <b>Selected Eco Reward</b>. Please provide your delivery details below.</p>
    </div>

    <form id="redeemForm" onsubmit="completeRedemption(event)">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="email@example.com" required>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" placeholder="" required>
        </div>

        <div class="form-group">
            <label>Shipping Address</label>
            <input type="text" placeholder="Street name, Villa/Apartment number, City" required>
        </div>

        <button type="submit" class="confirm-btn">Confirm Redemption</button>
    </form>
</div>

<div id="footer">
    <h4>Eco Essentials</h4>
    <p>Leading the way in sustainable rewards.</p>
</div>

<script>
    function loadBalance() {
        let tokens = localStorage.getItem('ecoTokens') || 0;
        document.getElementById('balance').innerText = tokens;
    }

    function completeRedemption(event) {
        event.preventDefault();
        
        // Final confirmation
        alert("Success! Your reward is on its way. Check your email for tracking details.");
        
        // Redirect back home
        window.location.href = "index.php";
    }

    loadBalance();
</script>

</body>
</html>
